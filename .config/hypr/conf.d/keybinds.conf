# Keybindings Configuration
# See https://wiki.hyprland.org/Configuring/Binds/

$mainMod = SUPER

# Application launchers
bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, E, exec, dolphin
bind = $mainMod, D, exec, sh $HOME/.config/rofi/bin/launcher
bind = $mainMod, period, exec, sh $HOME/.config/rofi/bin/emoji
bind = $mainMod SHIFT, V, exec, [float; size 1150 590; center] kitty --class clippicker -o close_on_child_death=yes -e sh $HOME/.config/rofi/bin/clipboard
bind = $mainMod SHIFT, B, exec, [float; size 1150 590; center] kitty --class floating -e bluetui
bind = $mainMod SHIFT, N, exec, [float; size 1150 590; center] kitty --class floating -e gazelle

# Window management
bind = $mainMod, Q, killactive,
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, C, exec, hyprpicker -a -f hex

# Session
bind = $mainMod, M, exit,
bind = $mainMod, B, exec, hyprlock
bind = $mainMod SHIFT, E, exec, [float; size 1150 590; center] env NOAUTOATTACH=1 YAZI_FLOAT=1 EDITOR=nvim kitty --class yazi-float yazi

# Hardware controls
bind = $mainMod SHIFT, P, exec, brightnessctl s +5%
bind = $mainMod SHIFT, O, exec, brightnessctl s 5%-
bind = $mainMod SHIFT, K, exec, asusctl led-mode -n

# Fn keys
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86KbdBrightnessDown, exec, brightnessctl -d asus::kbd_backlight s 1-
bindl = , XF86KbdBrightnessUp, exec, brightnessctl -d asus::kbd_backlight s +1
bindl = , XF86Launch3, exec, asusctl led-mode -n
binde = , XF86MonBrightnessDown, exec, brightnessctl s 5%-
binde = , XF86MonBrightnessUp, exec, brightnessctl s +5%
$touchpadToggle = if [ -f /tmp/touchpad-off ]; then rm /tmp/touchpad-off && hyprctl keyword device[asuf1204:00-2808:0201-touchpad]:enabled true && notify-send -t 2000 "Touchpad" "Enabled"; else touch /tmp/touchpad-off && hyprctl keyword device[asuf1204:00-2808:0201-touchpad]:enabled false && notify-send -t 2000 "Touchpad" "Disabled"; fi
bindl = , XF86TouchpadToggle, exec, $touchpadToggle
bind = , F10, exec, $touchpadToggle
bindl = , XF86Sleep, exec, systemctl suspend
bindl = , XF86RFKill, exec, rfkill toggle all

# M keys
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86Launch1, exec, rog-control-center

# Screenshot - save to file
bind = CONTROL, PRINT, exec, grim -g "$(slurp)" - | swappy -f - && notify-send "Screenshot saved to Pictures"
bind = CONTROL, I, exec, grim -g "$(slurp)" - | swappy -f - && notify-send "Screenshot saved to Pictures"

# Screenshot - clipboard
bind = SHIFT CONTROL, PRINT, exec, grim -g "$(slurp -d)" - | wl-copy
bind = SHIFT CONTROL, I, exec, grim -g "$(slurp -d)" - | wl-copy

# Move focus with mainMod + vim keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Move workspaces to different monitors
bind = CTRL ALT $mainMod SHIFT, period, movecurrentworkspacetomonitor, r
bind = CTRL ALT $mainMod SHIFT, comma, movecurrentworkspacetomonitor, l
