# Workspace Configuration
# Workspace assignments and monitor bindings

# Window-to-workspace assignments (silent = don't switch to workspace)
windowrulev2 = workspace 1 silent, class:^(kitty)$
windowrulev2 = workspace 2 silent, class:^(firefox)$
windowrulev2 = workspace 3 silent, class:^(vivaldi-stable)$
windowrulev2 = workspace 3 silent, class:^(vesktop)$

# Monitor-workspace bindings
# Workspace 1 defaults to laptop display
workspace = 1, monitor:eDP-2, default:true

# Workspace 2 prefers external monitor, with fallbacks
workspace = 2, monitor:HDMI-A-1, default:true
workspace = 2, monitor:HDMI-A-2, default:true
workspace = 2, monitor:DP-1, default:true
workspace = 2, monitor:DP-2, default:true
workspace = 2, monitor:DP-3, default:true
