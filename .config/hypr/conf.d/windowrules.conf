# Window Rules Configuration
# See https://wiki.hyprland.org/Configuring/Window-Rules/

# Path of Exile - Awakened PoE Trade overlay
windowrulev2 = tag +apt, title:(Awakened PoE Trade)
windowrulev2 = float, tag:apt
windowrulev2 = noblur, tag:apt
windowrulev2 = nofocus, tag:apt
windowrulev2 = noshadow, tag:apt
windowrulev2 = noborder, tag:apt
windowrulev2 = size 100% 100%, tag:apt
windowrulev2 = center, tag:apt

# Path of Exile - main game
windowrulev2 = tag +poe, title:(Path of Exile)
windowrulev2 = tag +poe, class:(steam_app_238960)
windowrulev2 = float, tag:poe

# Wakfu
windowrulev2 = tag +wak, title:(WAKFU)
windowrulev2 = tile, tag:wak
windowrulev2 = workspace 4, tag:wak

# Firefox Picture-in-Picture
windowrulev2 = keepaspectratio,class:^(firefox)$,title:^(Picture-in-Picture)$
windowrulev2 = noborder,class:^(firefox)$,title:^(Picture-in-Picture)$
windowrulev2 = pin,class:^(firefox)$,title:^(Firefox)$
windowrulev2 = pin,class:^(firefox)$,title:^(Picture-in-Picture)$
windowrulev2 = float,class:^(firefox)$,title:^(Firefox)$
windowrulev2 = float,class:^(firefox)$,title:^(Picture-in-Picture)$

# Dofus
windowrulev2 = tag +dofus, title:(Dofus)
windowrulev2 = tile, tag:dofus
