# Autostart Applications
# Commands that run once at Hyprland startup
# Update environment FIRST (required for Waybar to find Hyprland socket)
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE
exec-once = systemctl --user start hyprpolkitagent

# Core services (after environment is set)
exec-once = waybar & hyprpaper & kdeconnect-indicator


# KDE Connect
exec-once = /usr/lib/kdeconnectd&!
exec-once = /usr/bin/indicator-kdeconnect&!

# Startup applications
exec-once = kitty
exec-once = firefox
exec-once = vivaldi
exec-once = flatpak run dev.vencord.Vesktop

# Move apps to workspaces after they launch
exec-once = sleep 2 && hyprctl dispatch movetoworkspacesilent 2,class:^(firefox)$
exec-once = sleep 3 && hyprctl dispatch movetoworkspacesilent 3,class:^(vivaldi)
exec-once = sleep 4 && hyprctl dispatch movetoworkspacesilent 3,class:^(vesktop)$
exec-once = sleep 4 && hyprctl dispatch movetoworkspacesilent 3,class:^(VencordDesktop)$
