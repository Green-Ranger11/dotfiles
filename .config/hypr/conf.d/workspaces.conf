# Workspace Configuration
# Workspace assignments and monitor bindings

# Window-to-workspace assignments (silent = don't switch to workspace)
# Using new v3 syntax for Hyprland 0.53+
windowrule = workspace 4 silent, match:class ^(org\.mozilla\.Thunderbird|[Tt]hunderbird)$
windowrule = workspace 2 silent, match:class ^(kitty)$
windowrule = workspace 3 silent, match:class ^(firefox)$
windowrule = workspace 1 silent, match:class ^(vesktop|Vesktop|VencordDesktop)$

# Monitor-workspace bindings
# Workspace 1 on laptop display
workspace = 1, monitor:eDP-2, default:true
workspace = 3, monitor:eDP-2
workspace = 4, monitor:eDP-2

# Workspace 2 on external monitor (Philips ultrawide)
# Bind by description, not connector name: DP-2/DP-1 swap across replugs.
# NOTE: a workspace can only be bound to ONE monitor; the LAST binding wins.
# Binding to two monitors put ws2 on the disconnected one -> fell back to eDP-2.
workspace = 2, monitor:desc:Philips Consumer Electronics Company PHL 346B1C 1322131231233, default:true
