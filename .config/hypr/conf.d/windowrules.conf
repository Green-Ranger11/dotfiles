# Window Rules Configuration
# See https://wiki.hyprland.org/Configuring/Window-Rules/
# Using new v3 syntax for Hyprland 0.53+

# Path of Exile - Awakened PoE Trade overlay
windowrule {
    name = apt-tag
    tag = +apt
    match:title = Awakened PoE Trade
}
windowrule = float on, match:tag apt
windowrule = no_blur on, match:tag apt
windowrule = no_focus on, match:tag apt
windowrule = no_shadow on, match:tag apt
windowrule = border_size 0, match:tag apt
windowrule = size 100% 100%, match:tag apt
windowrule = center on, match:tag apt

# Path of Exile - main game
windowrule = tag +poe, match:title Path of Exile
windowrule = tag +poe, match:class steam_app_238960
windowrule = float on, match:tag poe

# Wakfu
windowrule = tag +wak, match:title WAKFU
windowrule = tile on, match:tag wak
windowrule = workspace 4, match:tag wak

# Firefox Picture-in-Picture
windowrule = keep_aspect_ratio on, match:class ^(firefox)$, match:title ^(Picture-in-Picture)$
windowrule = border_size 0, match:class ^(firefox)$, match:title ^(Picture-in-Picture)$
windowrule = pin on, match:class ^(firefox)$, match:title ^(Firefox)$
windowrule = pin on, match:class ^(firefox)$, match:title ^(Picture-in-Picture)$
windowrule = float on, match:class ^(firefox)$, match:title ^(Firefox)$
windowrule = float on, match:class ^(firefox)$, match:title ^(Picture-in-Picture)$

# Dofus
windowrule = tag +dofus, match:title Dofus
windowrule = tile on, match:tag dofus

# Yazi floating file manager
windowrule = float on, match:class ^(yazi-float)$

# Dunst notification slide-in from right
layerrule = animation slide right, match:namespace notifications